    <style>
        :root {
            --bg: #050505;
            --card: #121212;
            --card-hover: #1c1c1c;
            --accent: #006330;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --border: #000000;
            --shadow: rgba(0, 99, 48, 0.2);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Segoe UI, Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.4;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            padding: 20px 20px;
            max-width: 900px;
        }

        header h1 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }
        header h2 {
            font-size: 1.4rem;
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: 1px;
            color: var(--text-dim);
        }
        header p {
            color: var(--text-dim);
            font-size: 1.1rem;
        }

        .main-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            width: 94%;
            max-width: 1500px;
            padding-bottom: 80px;
        }

        .post-box {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            text-decoration: none;
        }

        .post-box:hover {
            transform: translateY(-10px);
            background: var(--card-hover);
            border-color: var(--accent);
            box-shadow: 0 12px 30px var(--shadow);
        }

        .post-title {
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 15px;
            height: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: var(--text-main);
        }

        .post-image {
            width: 100%;
            aspect-ratio: 15/9;
            object-fit: cover;
            border-radius: 5px;
            margin-bottom: 18px;
            background: #222;
        }

        .post-description {
            color: var(--text-dim);
            font-size: 1.0rem;
            text-align: center;
            margin-bottom: 20px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .btn-download {
            background-color: var(--accent);
            color: #fff;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
            margin-top: auto;
        }
        .main-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            width: 98%;
            max-width: 1650px;
            padding-bottom: 80px;
        }
        .post-box:hover {
            transform: scale(1.03);
            border-color: #444444;
            box-shadow: 0 0 20px rgba(0, 123, 255, 0.2);
        }
        @media (max-width: 868px) {
            header h1 { font-size: 2rem; }
            .main-container { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 580px) {
            .main-container { grid-template-columns: 1fr; }
        }
    </style>
